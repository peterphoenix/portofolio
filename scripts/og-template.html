<!doctype html>
<!-- Template for public/og-image.png (1200x630). Regenerate with scripts/generate-og.mjs -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      @font-face {
        font-family: 'JetBrains Mono Variable';
        src: url('../node_modules/@fontsource-variable/jetbrains-mono/files/jetbrains-mono-latin-wght-normal.woff2') format('woff2');
        font-weight: 100 800;
      }
      @font-face {
        font-family: 'Space Grotesk Variable';
        src: url('../node_modules/@fontsource-variable/space-grotesk/files/space-grotesk-latin-wght-normal.woff2') format('woff2');
        font-weight: 300 700;
      }
      * { margin: 0; box-sizing: border-box; }
      body {
        width: 1200px;
        height: 630px;
        background: #0a0a0f;
        background-image: radial-gradient(circle, #2e2e3d 1px, transparent 1px);
        background-size: 32px 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'JetBrains Mono Variable', monospace;
        position: relative;
        overflow: hidden;
      }
      .glow {
        position: absolute;
        width: 700px;
        height: 500px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 224, 164, 0.07);
        border-radius: 50%;
        filter: blur(80px);
      }
      .terminal {
        position: relative;
        width: 860px;
        background: #10101a;
        border: 1px solid #23232f;
        border-radius: 14px;
        box-shadow: 0 0 60px -10px rgba(0, 224, 164, 0.35);
      }
      .bar {
        display: flex;
        align-items: center;
        gap: 9px;
        background: #161622;
        border-bottom: 1px solid #23232f;
        border-radius: 14px 14px 0 0;
        padding: 16px 22px;
      }
      .dot { width: 14px; height: 14px; border-radius: 50%; background: #34344a; }
      .dot.accent { background: rgba(0, 224, 164, 0.7); }
      .bar span { margin-left: 14px; font-size: 17px; color: #5c5c70; }
      .body { padding: 44px 56px 52px; }
      .prompt { font-size: 24px; color: #5c5c70; }
      .prompt b { color: #00e0a4; font-weight: 600; }
      h1 {
        font-family: 'Space Grotesk Variable', sans-serif;
        font-size: 86px;
        font-weight: 700;
        letter-spacing: -2px;
        color: #e8e8f0;
        margin: 14px 0 30px;
      }
      .role { font-family: 'Space Grotesk Variable', sans-serif; font-size: 34px; color: #a0a0b0; margin: 12px 0 32px; }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid rgba(0, 224, 164, 0.3);
        background: rgba(0, 224, 164, 0.12);
        border-radius: 999px;
        padding: 10px 20px;
        font-size: 20px;
        color: #00e0a4;
      }
      .badge i { width: 11px; height: 11px; border-radius: 50%; background: #00e0a4; }
      .url {
        position: absolute;
        bottom: 26px;
        right: 36px;
        font-size: 18px;
        color: #5c5c70;
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="terminal">
      <div class="bar">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot accent"></div>
        <span>peter@phoenix:~</span>
      </div>
      <div class="body">
        <p class="prompt"><b>$</b> whoami</p>
        <h1>Peter Phoenix</h1>
        <p class="prompt"><b>$</b> cat role.txt</p>
        <p class="role">Senior Software Engineer · Go · Kubernetes · Distributed Systems</p>
        <span class="badge"><i></i>systemd: open-to-work</span>
      </div>
    </div>
    <p class="url">peterphoenix.github.io/portofolio</p>
  </body>
</html>
